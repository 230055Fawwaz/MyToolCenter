{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_card.css') }}">
{% endblock %}

{% extends "base.html" %}

{% block content %}
    <div class="main-container">
        <div class="header-section">
            <h3>Script Tersedia</h3>
            <button id="addCardBtn" class="btn-add">Tambah +</button>
        </div>

        <div id="cardGrid" class="card-grid">
            {% for script in scripts %}
            <div class="script-card" id="card-{{ script.id }}">
                <h4>{{ script.name }}</h4>
                <p>{{ script.description }}</p>
                <div class="card-footer">
                    <small>Status: <span id="status-{{ script.id }}">{{ script.status }}</span></small>
                    <button class="btn-run" onclick="runScript({{ script.id }})">Jalankan</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="{{ url_for('static', filename='js/script_manager.js') }}"></script>
{% endblock %}
